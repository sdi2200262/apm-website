<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 266" fill="none">
  <defs>
    <marker id="ah" viewBox="0 0 8 6" refX="7.5" refY="3" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9090a0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="360" height="266" fill="#f5f5f7"/>

  <!-- Header (no separator, spaced by padding) -->
  <text x="180" y="20" font-family="'JetBrains Mono', monospace" font-size="9" fill="#5a5a6a" letter-spacing="1.5" text-anchor="middle">PLANNING PHASE</text>

  <!-- CONTEXT GATHERING label (between the two arcs) -->
  <text x="141" y="72" font-family="'JetBrains Mono', monospace" font-size="8" fill="#5a5a6a" letter-spacing="0.8" text-anchor="middle">CONTEXT GATHERING</text>

  <!-- YOU box -->
  <rect x="10" y="56" width="68" height="28" rx="2" stroke="#d0d0d8" stroke-width="1"/>
  <text x="44" y="74" font-family="'JetBrains Mono', monospace" font-size="8" fill="#5a5a6a" letter-spacing="0.8" text-anchor="middle">YOU</text>

  <!-- PLANNER box (accent) -->
  <rect x="204" y="56" width="90" height="28" rx="2" stroke="#2a8d86" stroke-width="1"/>
  <text x="249" y="74" font-family="'JetBrains Mono', monospace" font-size="8" fill="#1a1a20" letter-spacing="0.8" text-anchor="middle">PLANNER</text>

  <!-- Curved arc: YOU → PLANNER (top, curving upward) -->
  <path d="M 78,63 Q 141,46 204,63" stroke="#9090a0" stroke-width="1" fill="none" marker-end="url(#ah)"/>

  <!-- Curved arc: PLANNER → YOU (bottom, curving downward) -->
  <path d="M 204,77 Q 141,94 78,77" stroke="#9090a0" stroke-width="1" fill="none" marker-end="url(#ah)"/>

  <!-- Work breakdown path: down → left → down (rounded corners) -->
  <path d="M 249,84 L 249,122 Q 249,129 242,129 L 187,129 Q 180,129 180,136 L 180,155" stroke="#9090a0" stroke-width="1" fill="none" marker-end="url(#ah)"/>

  <!-- WORK BREAKDOWN label (beside horizontal segment, same height) -->
  <text x="253" y="126" font-family="'JetBrains Mono', monospace" font-size="8" fill="#5a5a6a" letter-spacing="0.8">WORK BREAKDOWN</text>

  <!-- .apm/ dashed group -->
  <rect x="60" y="158" width="240" height="76" rx="2" stroke="#9090a0" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- .apm/ label (centered, larger, top of group) -->
  <text x="180" y="175" font-family="'JetBrains Mono', monospace" font-size="8" fill="#5a5a6a" letter-spacing="0.8" text-anchor="middle">.apm/</text>

  <!-- SPEC box -->
  <rect x="68" y="194" width="62" height="26" rx="2" stroke="#d0d0d8" stroke-width="1" fill="#eaeaef"/>
  <text x="99" y="211" font-family="'JetBrains Mono', monospace" font-size="8" fill="#5a5a6a" letter-spacing="0.8" text-anchor="middle">SPEC</text>

  <!-- PLAN box -->
  <rect x="149" y="194" width="62" height="26" rx="2" stroke="#d0d0d8" stroke-width="1" fill="#eaeaef"/>
  <text x="180" y="211" font-family="'JetBrains Mono', monospace" font-size="8" fill="#5a5a6a" letter-spacing="0.8" text-anchor="middle">PLAN</text>

  <!-- RULES box -->
  <rect x="230" y="194" width="62" height="26" rx="2" stroke="#d0d0d8" stroke-width="1" fill="#eaeaef"/>
  <text x="261" y="211" font-family="'JetBrains Mono', monospace" font-size="8" fill="#5a5a6a" letter-spacing="0.8" text-anchor="middle">RULES</text>

  <!-- you review & approve -->
  <text x="180" y="252" font-family="'JetBrains Mono', monospace" font-size="8" fill="#5a5a6a" letter-spacing="0.5" text-anchor="middle">you review &amp; approve</text>
</svg>
